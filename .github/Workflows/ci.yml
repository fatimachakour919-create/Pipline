name: Pipline simple
on:
  push:
    branches:
      -main
  pull request:
    branches:
      -main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récuperer le code
        uses: action/chekout
      - name: installer python
        uses: action/setup-python
        with:
          python-version: "3.11"
      - name: installer lse dependances
        run: pip install -r requirements.txt
      - name: lint lo code
        run: |
          flake8 app --count --select=E9,F63,F82,F841 --show-source --statistics
          flake8 app --count  --max-complexity=10 --max-line-length=127 --statistics
          flake8 tests --count --max-line-length=127 --statistics
      - name: lancer les tests
        run: pytest -v --cov=app

